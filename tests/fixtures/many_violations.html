<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<body>
    <!-- No lang attribute on html -->
    <!-- Empty title -->
    <!-- No viewport meta tag -->
    <!-- No skip link -->

    <img src="photo.jpg">
    <!-- Missing alt text -->

    <img src="banner.png" alt="">
    <!-- Empty alt on non-decorative image -->

    <div onclick="doSomething()">Click me</div>
    <!-- Non-semantic clickable element without role or keyboard support -->

    <input type="text" placeholder="Enter name">
    <!-- Input without label -->

    <select>
        <option>Option 1</option>
        <option>Option 2</option>
    </select>
    <!-- Select without label -->

    <a href="/page"></a>
    <!-- Empty link text -->

    <button></button>
    <!-- Empty button -->

    <h1>First heading</h1>
    <h3>Skipped to h3</h3>
    <!-- Heading level skip -->

    <p style="color: #aaa; background: #fff;">Low contrast text</p>
    <!-- Contrast ratio too low -->

    <table>
        <tr><td>Data 1</td><td>Data 2</td></tr>
    </table>
    <!-- Table without headers -->
</body>
</html>
